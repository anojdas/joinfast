<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#050d10;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:auto;}
body::before{content:"";position:fixed;width:100%;height:100%;
background-image:linear-gradient(rgba(0,255,100,0.07) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,100,0.07) 1px, transparent 1px);
background-size:50px 50px;animation:gridMove 8s linear infinite;z-index:-1;}
@keyframes gridMove{0%{background-position:0 0;}100%{background-position:50px 50px;}}
.container{text-align:center;max-width:850px;padding:40px 20px;}
.logo{width:150px;height:150px;border-radius:50%;margin:0 auto 20px;
background:radial-gradient(circle,#ffd700,#ff9800);
display:flex;justify-content:center;align-items:center;font-size:45px;font-weight:900;color:#111;
border:6px solid #00ff88;animation:glowPulse 2s infinite alternate;}
@keyframes glowPulse{from{box-shadow:0 0 20px #00ff88;}to{box-shadow:0 0 60px #00ff88;}}
.glitch{font-size:42px;font-weight:900;color:#00ff88;text-transform:uppercase;
animation:glitch 1s infinite;letter-spacing:3px;}
@keyframes glitch{
0%{text-shadow:2px 2px #ff00c8,-2px -2px #00fff9;}
25%{text-shadow:-2px -2px #ff00c8,2px 2px #00fff9;}
50%{text-shadow:2px -2px #ff00c8,-2px 2px #00fff9;}
75%{text-shadow:-2px 2px #ff00c8,2px -2px #00fff9;}
100%{text-shadow:2px 2px #ff00c8,-2px -2px #00fff9;}}
h2{margin-top:10px;letter-spacing:4px;color:#ccc;}
p{color:#aaa;margin:20px 0;}
.join-btn{display:inline-block;padding:15px 50px;background:#00c853;border-radius:12px;
font-size:20px;font-weight:600;text-decoration:none;color:#fff;
animation:buttonPulse 1.5s infinite;transition:0.3s;}
@keyframes buttonPulse{
0%{box-shadow:0 0 10px #00ff88;}
50%{box-shadow:0 0 35px #00ff88;}
100%{box-shadow:0 0 10px #00ff88;}}
.join-btn:hover{transform:scale(1.1);}
.rating-box{margin:50px auto;background:#0b1a1f;padding:30px;border-radius:20px;
max-width:650px;display:flex;justify-content:space-between;align-items:center;
border:1px solid rgba(0,255,100,0.2);box-shadow:0 0 20px rgba(0,255,100,0.1);
flex-wrap:wrap;gap:20px;}
.stars{color:#ffd700;font-size:22px;}
.members{color:#00ff88;font-size:22px;font-weight:700;}
.features{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
.card{width:160px;padding:25px;background:#0b1a1f;border-radius:15px;
border:1px solid rgba(0,255,100,0.2);transition:0.3s;}
.card:hover{transform:translateY(-8px);box-shadow:0 0 25px #00ff88;}
.card span{font-size:30px;display:block;margin-bottom:10px;}
.contact{margin-top:40px;display:inline-block;padding:12px 35px;
border:1px solid #00ff88;border-radius:25px;text-decoration:none;color:#00ff88;transition:0.3s;}
.contact:hover{background:#00ff88;color:#000;}
</style>
</head>
<body>
<div class="container">
<div class="logo">BHT</div>
<div class="glitch">BHT CLUB</div>
<h2>OFFICIAL CHANNEL</h2>
<p>Premium community for smart players & exclusive updates</p>
<a href="https://t.me/+h1z0MsHsDhg1MTU9" target="_blank" class="join-btn"
onclick="fbq('track', 'Lead'); this.innerHTML='Opening Telegram... 🚀'">
🚀 Join BHT Club</a>
<div class="rating-box">
<div>
<div class="stars">★★★★★</div>
<div>4.9<br><small style="color:#888;">Club Rating</small></div>
</div>
<div class="members">
18.2K<br><small style="color:#888;">Active Members</small>
</div>
</div>
<div class="features">
<div class="card"><span>💎</span>Premium Tips</div>
<div class="card"><span>🔥</span>Live Updates</div>
<div class="card"><span>👑</span>VIP Community</div>
</div>
<a href="#" class="contact">Contact</a>
</div>
</body>
